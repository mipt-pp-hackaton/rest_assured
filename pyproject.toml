[project]
name = "rest_assured"
version = "0.1.0"
description = ""
authors = [
    {name = "AndreyQuantum",email = "zelentsov1254@gmail.com"}
]
readme = "README.md"
requires-python = "<4.0,>=3.13"
dependencies = [
    "loguru (>=0.7.3,<0.8.0)",
    "fastapi[standard] (>=0.124.4,<0.125.0)",
    "dynaconf (>=3.2.12,<4.0.0)",
    "sqlmodel (>=0.0.27,<0.0.28)",
    "alembic (>=1.17.2,<2.0.0)",
    "syncpg (>=1.1.3,<2.0.0)",
    "testcontainers (>=4.13.3,<5.0.0)",
    "pytest-asyncio (>=1.3.0,<2.0.0)"
]


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[dependency-groups]
dev = [
    "ruff (>=0.14.9,<0.15.0)",
    "pytest (>=9.0.2,<10.0.0)",
    "mypy (>=1.19.1,<2.0.0)",
    "python-semantic-release (>=9.1.0,<10.0.0)"
]

[tool.ruff.lint.per-file-ignores]
"rest_assured/integrational_tests/*" = ["E501"]
"rest_assured/tests/*" = ["E501"]
"rest_assured/src/models/__init__.py" = ["F401"]

[tool.ruff]
exclude = [
    "rest_assured/src/alembic/"
]
line-length = 88
[project.scripts]
pa-server = "rest_assured.src.cli:main"
pa-migrate = "rest_assured.src.cli:run_migrations"

[tool.semantic_release]
version_toml = [
    "pyproject.toml:project.version",
]
branches = ["main"]
upload_to_release = true
build_command = "pip install poetry && poetry build"
major_on_zero = false

[tool.semantic_release.changelog]
template_dir = "templates"
changelog_file = "CHANGELOG.md"

[tool.semantic_release.changelog.default_templates]
changelog_file = "CHANGELOG.md"

[tool.semantic_release.commit_parser_options]
allowed_tags = ["build", "chore", "ci", "docs", "feat", "fix", "perf", "refactor", "style", "test"]
minor_tags = ["feat"]
patch_tags = ["fix", "perf"]